    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!-- Aapki GitHub details ke mutabiq base path -->
<base href="https://raw.githubusercontent.com/shanzanawaz/My-portfolio/main/">
<title>Rosé Studio — Premium Fashion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* CSS styles wahi hain jo hum ne pehle discuss kiye the */
body { font-family: 'DM Sans', sans-serif; }
.slider-track { display: flex; transition: transform 0.5s ease; }
.slider-track img { min-width: 100%; height: 400px; object-fit: cover; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px 6vw; }
.product-card { border: 1px solid #eee; border-radius: 15px; overflow: hidden; }
.prod-track { display: flex; transition: 0.3s; }
.prod-track img { min-width: 100%; height: 300px; object-fit: cover; }
</style>
</head>
<body>

<section>
  <h1>Rosé Studio</h1>
  <div style="width:100%; overflow:hidden;">
    <div class="slider-track" id="heroTrack">
      <img src="images/mohammadabbasibLaMHGx3cIgunsplash.jpg" alt="Model 1"/>
      <img src="images/muneebmalhotra340zW7f6wJcunsplash.jpg" alt="Model 2"/>
      <img src="images/muneebmalhotraPs6bTHRuJYgunsplash.jpg" alt="Model 3"/>
    </div>
  </div>
</section>

<section class="product-grid">
  <!-- Card 1 -->
  <div class="product-card">
    <div class="prod-track">
      <img src="images/muneebmalhotraRdv9MBPHgYunsplash.jpg" alt="1"/>
      <img src="images/muneebmalhotratK5QwL0r0ewunsplash.jpg" alt="2"/>
    </div>
  </div>
  <!-- Card 2 -->
  <div class="product-card">
    <div class="prod-track">
      <img src="images/pexelsbijoyrahaman215872163835560689.jpg" alt="1"/>
      <img src="images/pexelsdhanno20792015.jpg" alt="2"/>
    </div>
  </div>
  <!-- Card 3 -->
  <div class="product-card">
    <div class="prod-track">
      <img src="images/pexelsdhanno25288453.jpg" alt="1"/>
      <img src="images/pexelsdhanno35902080.jpg" alt="2"/>
      <img src="images/pexelsdhanno36104911.jpg" alt="3"/>
    </div>
  </div>
  <!-- Card 4 -->
  <div class="product-card">
    <div class="prod-track">
      <img src="images/pexelsgurshergill6370201030167011.jpg" alt="1"/>
      <img src="images/pexelsgurshergill6370201030167012.jpg" alt="2"/>
    </div>
  </div>
  <!-- Card 5 -->
  <div class="product-card">
    <div class="prod-track">
      <img src="images/pexelsiramshehzad4508140436908409.jpg" alt="1"/>
      <img src="images/mohammadabbasibLaMHGx3cIgunsplash.jpg" alt="2"/>
    </div>
  </div>
  <!-- Card 6 -->
  <div class="product-card">
    <div class="prod-track">
      <img src="images/muneebmalhotra340zW7f6wJcunsplash.jpg" alt="1"/>
      <img src="images/muneebmalhotraPs6bTHRuJYgunsplash.jpg" alt="2"/>
      <img src="images/muneebmalhotraRdv9MBPHgYunsplash.jpg" alt="3"/>
    </div>
  </div>
</section>

<script>
document.querySelectorAll('.prod-track').forEach(track => {
    let idx = 0;
    track.addEventListener('click', () => {
        idx = (idx + 1) % track.children.length;
        track.style.transform = `translateX(-${idx * 100}%)`;
    });
});
</script>
</body>
</html>
