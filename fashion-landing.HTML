<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!-- GitHub path ensure kar raha hai ke images link hon -->
    <base href="https://raw.githubusercontent.com/shanzanawaz/My-portfolio/main/">
    <title>Rosé Studio | Elite Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; }
        .hero-banner { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: #000; }
        .hero-banner h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: #fff; margin: 0; }
        
        .product-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 60px 5vw; }
        .luxury-card { background: #161616; border: 1px solid #333; padding: 20px; transition: 0.4s; }
        .luxury-card:hover { border-color: #c5a059; }
        .luxury-card img { width: 100%; height: 400px; object-fit: cover; }
        
        .price-tag { color: #c5a059; font-size: 1.4rem; font-weight: 600; margin: 15px 0; }
        .btn-luxury { display: block; width: 100%; padding: 12px; background: #c5a059; color: #000; text-align: center; text-decoration: none; font-weight: 600; margin-top: 10px; border: none; cursor: pointer; }
        .btn-cart { background: #333; color: #fff; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="hero-banner">
    <h1>Rosé Studio</h1>
    <p>Elite Collection - Handcrafted in Multan</p>
</div>

<div class="product-container">
    <!-- Product 1 -->
    <div class="luxury-card">
        <img src="images/muneebmalhotraRdv9MBPHgYunsplash.jpg">
        <h3>Formal Essence</h3>
        <p class="price-tag">Rs. 5,500</p>
        <button class="btn-luxury btn-cart" onclick="alert('Added to Cart')">Add to Cart</button>
        <a href="https://wa.me/923094076010?text=I want to buy Formal Essence" class="btn-luxury">Buy via WhatsApp</a>
    </div>

    <!-- Product 2 -->
    <div class="luxury-card">
        <img src="images/pexelsdhanno25288453.jpg">
        <h3>Lavender Chiffon</h3>
        <p class="price-tag">Rs. 6,800</p>
        <button class="btn-luxury btn-cart" onclick="alert('Added to Cart')">Add to Cart</button>
        <a href="https://wa.me/923094076010?text=I want to buy Lavender Chiffon" class="btn-luxury">Buy via WhatsApp</a>
    </div>

    <!-- Aap isi tarah baki 12 products isi 'luxury-card' format mein add karein -->
</div>

</body>
</html>
